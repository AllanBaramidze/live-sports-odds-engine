version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sports_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sports_network

  valkey:
    image: valkey/valkey:8.0
    container_name: valkey
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    command: >
      valkey-server
      --save 60 1000
      --loglevel notice
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sports_network

  redis-insight:
    image: redislabs/redisinsight:1.14.0
    container_name: redis_insight
    ports:
      - "8001:8001"
    restart: always
    networks:
      - sports_network

volumes:
  postgres_data:
  valkey_data:

networks:
  sports_network:
    driver: bridge